name: Auto Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and tag
        run: |
          # Get latest semver tag, default to v0.0.0 if none
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          LATEST=${LATEST:-v0.0.0}

          # Strip the 'v' and split into parts
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Increment patch
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "Latest tag: $LATEST → New tag: $NEW_TAG"

          git tag $NEW_TAG
          git push origin $NEW_TAG

          # Keep VERSION file in sync
          echo "${MAJOR}.${MINOR}.$((PATCH + 1))" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $NEW_TAG [skip ci]"
          git push
